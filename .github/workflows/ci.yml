name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax (py_compile)
        run: |
          find src/ -name '*.py' -print0 | xargs -0 python -m py_compile

      - name: Run unit tests
        run: |
          python tests/test_core.py

      - name: Extract JS and validate syntax
        run: |
          python -c "
          import re
          with open('public/index.html','r') as f:
              content = f.read()
          m = re.search(r'<script>(.*?)</script>', content, re.DOTALL)
          if m:
              with open('/tmp/check_js.js','w') as f:
                  f.write(m.group(1))
          else:
              raise SystemExit('No <script> tag found in index.html')
          "
          node --check /tmp/check_js.js
