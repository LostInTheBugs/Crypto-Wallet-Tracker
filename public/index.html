<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Wallet Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#0a0e14;--card:#12161c;--border:#1e2530;--text:#b0b8c4;--title:#e6edf3;--accent:#4dabf7;--green:#40c463;--red:#f85149}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;display:flex}
.sidebar{width:220px;background:var(--card);border-right:1px solid var(--border);min-height:100vh;padding:20px 0;flex-shrink:0}
.sidebar h2{font-size:1rem;color:var(--title);padding:0 20px 16px;border-bottom:1px solid var(--border);margin-bottom:12px}
.sidebar a{display:block;padding:10px 20px;color:var(--text);text-decoration:none;font-size:.85rem;transition:all .1s}
.sidebar a:hover,.sidebar a.active{color:var(--accent);background:#1a2838;border-left:3px solid var(--accent);padding-left:17px}
.main{flex:1;padding:24px;overflow-x:auto}
.topbar{display:flex;justify-content:space-between;align-items:center;padding-bottom:16px;margin-bottom:20px;border-bottom:1px solid var(--border)}
.topbar h1{font-size:1.2rem;color:var(--title);font-weight:600}
.topbar h1 span{font-size:.7rem;background:#1a2332;color:var(--accent);padding:2px 8px;border-radius:10px;font-weight:400;margin-left:8px}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar select{padding:5px 10px;background:var(--bg);border:1px solid var(--border);color:var(--accent);border-radius:5px;font-size:.8rem;cursor:pointer}
.topbar .user{color:var(--accent);font-size:.8rem}
.topbar button{background:var(--card);border:1px solid var(--border);color:var(--text);padding:5px 12px;border-radius:5px;cursor:pointer;font-size:.8rem}
.topbar button:hover{background:#1a2332}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 18px}
.stat-card .label{font-size:.7rem;color:#6e7681;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stat-card .value{font-size:1.5rem;font-weight:700;color:var(--title)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
@media(max-width:768px){.row{grid-template-columns:1fr}.sidebar{width:60px}.sidebar a{font-size:0;padding:10px}.sidebar h2{font-size:0}}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px}
.card h2{font-size:.9rem;color:var(--title);margin-bottom:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.chart-wrap{position:relative;height:260px}
.chart-wrap canvas{max-height:260px}
input{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--title);font-size:.85rem;outline:none}
input:focus{border-color:var(--accent)}
.btn{display:inline-block;padding:8px 18px;border-radius:6px;border:none;cursor:pointer;font-weight:600;font-size:.85rem}
.btn-blue{background:var(--accent);color:#fff}.btn-blue:hover{opacity:.9}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{opacity:.9}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{opacity:.9}
.wallets-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.wallet-tab{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:7px 12px;cursor:pointer;font-size:.8rem;display:flex;align-items:center;gap:6px}
.wallet-tab:hover,.wallet-tab.active{border-color:var(--accent);background:#1a2838}
.wallet-tab.active{font-weight:700}
.wallet-tab .del{color:var(--red);cursor:pointer;margin-left:4px}
.wallet-tab.all{background:#1a3320;border-color:#2d5a3d;font-weight:700}
table{width:100%;border-collapse:collapse}
th{padding:8px 12px;text-align:left;font-size:.7rem;color:#6e7681;text-transform:uppercase;border-bottom:1px solid var(--border);font-weight:500}
td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:.82rem}
td.chain{color:var(--accent);text-transform:capitalize}
td.usd{color:var(--green);font-weight:600}
tr:hover td{background:#161c24}
.loading{text-align:center;padding:30px;color:#6e7681}
.error{color:var(--red);padding:6px 0;font-size:.8rem}
img.ti{width:20px;height:20px;border-radius:50%;margin-right:6px;vertical-align:middle;background:var(--border)}
.hidden{display:none}
.add-form{display:flex;gap:8px;margin-bottom:16px}
.add-form input{flex:1}
.add-form input+input{max-width:150px}
.range-pill{padding:2px 8px;border-radius:10px;cursor:pointer;color:#8b949e;border:1px solid transparent;transition:all .15s;font-size:.65rem}
.range-pill:hover{color:#c9d1d9;background:#1a2332}
.range-pill.active{color:var(--accent);background:#1f6feb22;border-color:#1f6feb44;font-weight:600}
.chains{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.chain-tag{padding:3px 8px;background:#1a2332;border:1px solid #1e2d42;border-radius:10px;font-size:.7rem;color:#c9d1d9}
</style>
</head>
<body>

<div class="sidebar hidden" id="sidebar">
  <h2>🪙 Tracker <span style="font-size:.65rem;color:var(--accent)">v1.13.2</span></h2>
  <a href="#" class="active" onclick="switchPage('dashboard')" data-page="dashboard">📊 Dashboard</a>
  <a href="#" onclick="switchPage('stats')" data-page="stats">📈 Statistiques</a>
  <a href="#" onclick="switchPage('tokens')" data-page="tokens">📋 Détail tokens</a>
  <a href="#" onclick="switchPage('wallets')" data-page="wallets">💼 Wallets</a>
</div>

<div class="main">
  <div class="topbar">
    <h1 id="pageTitle">📊 Dashboard</h1>
    <div class="topbar-right">
      <select id="currency" onchange="switchCurrency()"><option value="usd">$ USD</option><option value="eur">€ EUR</option></select>
      <span class="user" id="userInfo"></span>
      <button id="btnLogout" class="hidden" onclick="logout()">Déconnexion</button>
    </div>
  </div>

  <div id="viewLogin">
    <div class="card" style="max-width:380px;margin:60px auto">
      <h2 id="authTitle">Connexion</h2>
      <input id="authUser" type="text" placeholder="Nom d'utilisateur" style="margin-bottom:8px">
      <input id="authPass" type="password" placeholder="Mot de passe" style="margin-bottom:8px">
      <button class="btn btn-green" onclick="doAuth()" style="width:100%;margin-bottom:8px" id="authBtn">Se connecter</button>
      <div id="authError" class="error"></div>
      <div style="text-align:center;font-size:.8rem"><a href="#" onclick="toggleAuth()" style="color:var(--accent)">Créer un compte</a></div>
    </div>
  </div>

  <div id="viewDash" class="hidden">

    <div id="pageDashboard">
      <div class="grid" id="walletStats"></div>
      <div class="row">
        <div class="card"><h2>📊 Répartition par chaîne</h2><div class="chart-wrap"><canvas id="pieChart"></canvas></div><div class="chains" id="walletChains" style="margin-top:12px"></div></div>
        <div class="card"><h2>📈 Évolution
          <span style="display:inline-flex;gap:4px;margin-left:8px">
            <span class="range-pill active" onclick="setQuickRange('day',this)">1J</span>
            <span class="range-pill" onclick="setQuickRange('week',this)">1S</span>
            <span class="range-pill" onclick="setQuickRange('month',this)">1M</span>
          </span>
        </h2><div class="chart-wrap"><canvas id="miniChart"></canvas></div></div>
      </div>
      <div id="walletError" style="margin-top:8px"></div>
    </div>

    <div id="pageStats" class="hidden">
      <div class="card"><h2>📈 Évolution du portefeuille
        <span style="display:inline-flex;gap:6px;margin-left:12px;align-items:center">
          <select id="chartWallet" onchange="drawLineChart()" style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:2px 6px;border-radius:4px;font-size:.65rem"><option value="">Tous</option></select>
          <select id="chartToken" onchange="drawLineChart()" style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:2px 6px;border-radius:4px;font-size:.65rem"><option value="">Tous</option></select>
          <span class="range-pill active" onclick="setRange('all',this)">All</span>
          <span class="range-pill" onclick="setRange('365',this)">1 an</span>
          <span class="range-pill" onclick="setRange('180',this)">6 mois</span>
          <span class="range-pill" onclick="setRange('90',this)">3 mois</span>
          <span class="range-pill" onclick="setRange('30',this)">1 mois</span>
        </span>
      </h2><div class="chart-wrap" style="height:350px"><canvas id="lineChart"></canvas></div></div>
    </div>

    <div id="pageTokens" class="hidden"></div>
    <div id="pageWallets" class="hidden"></div>
  </div>
</div>

<script>
var currentPage = "dashboard";
var authMode="login", wallets=[], activeWallet="ALL", eurRate=null, currency="usd";
var pieChart=null, lineChart=null, miniChart=null, lastResult=null, loadingAddr=null, chartRange="all", quickRange="day";

function switchPage(page) {
  currentPage = page;
  document.querySelectorAll(".sidebar a").forEach(function(a){ a.classList.remove("active"); });
  document.querySelector('[data-page="'+page+'"]').classList.add("active");
  document.getElementById("pageTitle").innerHTML = {"dashboard":"📊 Dashboard","stats":"📈 Statistiques","tokens":"📋 Détail tokens","wallets":"💼 Wallets"}[page];
  document.getElementById("pageDashboard").classList.toggle("hidden", page!="dashboard");
  document.getElementById("pageStats").classList.toggle("hidden", page!="stats");
  document.getElementById("pageTokens").classList.toggle("hidden", page!="tokens");
  document.getElementById("pageWallets").classList.toggle("hidden", page!="wallets");
  if (page=="dashboard" && lastResult) { renderResult(lastResult); drawMiniChart(); }
  if (page=="stats" && lastResult) { drawLineChart(); populateFilters(); }
  if (page=="tokens" && lastResult) renderTokenTable(lastResult);
  if (page=="wallets") renderWalletPage();
}

function setRange(range, el){ chartRange=range; document.querySelectorAll("#pageStats .range-pill").forEach(function(p){p.classList.remove("active")}); el.classList.add("active"); drawLineChart(); }

function setQuickRange(range, el){ quickRange=range; document.querySelectorAll("#pageDashboard .range-pill").forEach(function(p){p.classList.remove("active")}); el.classList.add("active"); drawMiniChart(); }

async function switchCurrency(){
  currency=document.getElementById("currency").value;
  if(currency=="eur"&&!eurRate){try{var r=await fetch("/api/rates");var d=await r.json();eurRate=d.eur}catch(e){eurRate=0.91}}
  if(lastResult){ renderResult(lastResult); if(currentPage=="dashboard") drawMiniChart(); else if(currentPage=="stats") drawLineChart(); else if(currentPage=="tokens") renderTokenTable(lastResult); }
}

function toCurr(usd){return(currency=="eur"&&eurRate)?usd*eurRate:usd}
function currSymbol(){return currency=="eur"?"€":"$"}
function fmtCurr(usd){var v=toCurr(usd);return currSymbol()+v.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}

function toggleAuth(){authMode=authMode=="login"?"register":"login";document.getElementById("authTitle").textContent=authMode=="login"?"Connexion":"Créer un compte";document.getElementById("authBtn").textContent=authMode=="login"?"Se connecter":"Créer le compte"}

async function doAuth(){
  var u=document.getElementById("authUser").value.trim(), p=document.getElementById("authPass").value;
  var path=authMode=="login"?"/api/auth/login":"/api/auth/register";
  try{var r=await fetch(path,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:u,password:p})});var d=await r.json();if(!r.ok){document.getElementById("authError").textContent=d.detail||d.msg||"Erreur";return}if(authMode=="register"){toggleAuth();document.getElementById("authError").textContent="Compte créé ! Connecte-toi.";return}showDash()}catch(e){document.getElementById("authError").textContent="Erreur réseau"}
}

async function logout(){await fetch("/api/auth/logout",{method:"POST"});document.getElementById("viewLogin").classList.remove("hidden");document.getElementById("viewDash").classList.add("hidden");document.getElementById("sidebar").classList.add("hidden");document.getElementById("userInfo").textContent="";document.getElementById("btnLogout").classList.add("hidden");activeWallet="ALL"}

async function showDash(){
  document.getElementById("viewLogin").classList.add("hidden");document.getElementById("viewDash").classList.remove("hidden");document.getElementById("sidebar").classList.remove("hidden");document.getElementById("btnLogout").classList.remove("hidden");
  var r=await fetch("/api/auth/me");if(r.ok){var u=await r.json();document.getElementById("userInfo").textContent="👤 "+u.username}
  await loadWallets();
}

async function loadWallets(){var r=await fetch("/api/wallets");wallets=await r.json();renderWalletTabs();loadView()}

function renderWalletTabs(){
  var el=document.getElementById("walletTabs");
  if(!el)return;
  var html='<div class="wallet-tab all'+(activeWallet=="ALL"?" active":"")+'" onclick="selectWallet(\"ALL\")">🏠 Tous</div>';
  for(var i=0;i<wallets.length;i++){var w=wallets[i];html+='<div class="wallet-tab'+(w.address==activeWallet?" active":"")+'" onclick="selectWallet(\"'+w.address+'\")">'+(w.label||w.address.slice(0,10)+"...")+'<span class="del" onclick="event.stopPropagation();delWallet('+w.id+')">&times;</span></div>'}
  el.innerHTML=html;
}

function selectWallet(addr){activeWallet=addr;renderWalletTabs();loadView()}

async function delWallet(id){if(!confirm("Supprimer ?"))return;await fetch("/api/wallets/"+id,{method:"DELETE"});if(wallets.find(function(w){return w.id==id&&w.address==activeWallet}))activeWallet="ALL";await loadWallets();if(currentPage=="wallets")renderWalletPage()}

function renderWalletPage(){
  var html = '<div class="card" style="margin-bottom:16px"><h2>+ Ajouter un wallet</h2><div class="add-form">'+
    '<input id="walletAddr" type="text" placeholder="Adresse EVM (0x...)">'+
    '<input id="walletLabel" type="text" placeholder="Label">'+
    '<button class="btn btn-blue" onclick="addWallet()">Ajouter</button></div></div>'+
    '<div class="card"><h2>Mes wallets <span style="font-weight:400;font-size:.7rem;color:#6e7681">('+wallets.length+')</span></h2>';
  if (wallets.length == 0) {
    html += '<div class="loading">Aucun wallet</div>';
  } else {
    html += '<table><thead><tr><th>Label</th><th>Adresse</th><th style="width:60px"></th></tr></thead><tbody>';
    for (var i=0;i<wallets.length;i++) {
      html += '<tr><td><b>'+(wallets[i].label||"—")+'</b></td><td style="font-family:monospace;font-size:.8rem">'+wallets[i].address+'</td>'+
        '<td><button class="btn btn-red" style="padding:4px 10px;font-size:.7rem" onclick="delWallet('+wallets[i].id+')">✕</button></td></tr>';
    }
    html += '</tbody></table>';
  }
  html += '</div>';
  document.getElementById("pageWallets").innerHTML = html;
}

async function addWallet(){var addr=document.getElementById("walletAddr").value.trim(),label=document.getElementById("walletLabel").value.trim();if(!addr.startsWith("0x")||addr.length!=42)return alert("Adresse invalide");var r=await fetch("/api/wallets",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({address:addr,label:label})});if(!r.ok){var e=await r.json();alert(e.detail);return}await loadWallets();if(currentPage=="wallets")renderWalletPage()}

async function loadView(force){activeWallet=="ALL"?await loadAllWallets(force):await loadOneWallet(activeWallet,force)}

async function loadOneWallet(addr,force){
  if(loadingAddr==addr&&!force)return;loadingAddr=addr;
  document.getElementById("walletStats").innerHTML='<div class="loading">Scan...</div>';
  try{var r=await fetch("/api/portfolio?address="+addr+(force?"&force=true":""));renderResult(await r.json())}catch(e){}
}

async function loadAllWallets(force){
  if(wallets.length==0){document.getElementById("walletStats").innerHTML="";if(pieChart)pieChart.destroy();if(lineChart)lineChart.destroy();return}
  document.getElementById("walletStats").innerHTML='<div class="loading">Scan '+wallets.length+' wallet(s)...</div>';
  try{
    var promises=wallets.map(function(w){return fetch("/api/portfolio?address="+w.address+(force?"&force=true":"")).then(function(r){return r.json()})});
    var results=await Promise.all(promises);
    var totalUsd=0,allTokens=[],chainTotals={},chainSet={},allErrors=[];
    for(var i=0;i<results.length;i++){var d=results[i],w=wallets[i];totalUsd+=d.total_usd||0;for(var j=0;j<d.tokens.length;j++){var t=d.tokens[j];t._wallet=w.label||w.address.slice(0,10)+"...";allTokens.push(t)}for(var c in d.chains){if(d.chains.hasOwnProperty(c)){chainTotals[c]=(chainTotals[c]||0)+d.chains[c];chainSet[c]=true}}if(d.errors)for(var k=0;k<d.errors.length;k++)allErrors.push({wallet:w.label||w.address.slice(0,10)+"...",chain:d.errors[k].chain,error:d.errors[k].error})}
    allTokens.sort(function(a,b){return b.usd_value-a.usd_value});
    renderResult({total_usd:Math.round(totalUsd*100)/100,token_count:allTokens.length,chain_count:Object.keys(chainSet).length,chains:chainTotals,tokens:allTokens.slice(0,200),errors:allErrors.slice(0,10)});
  }catch(e){}
}

function renderResult(d){
  lastResult=d;
  document.getElementById("walletStats").innerHTML=
    '<div class="stat-card"><div class="label">Valeur totale</div><div class="value">'+fmtCurr(d.total_usd)+'</div></div>'+
    '<div class="stat-card"><div class="label">Tokens</div><div class="value">'+d.token_count+'</div></div>'+
    '<div class="stat-card"><div class="label">Chaînes actives</div><div class="value">'+d.chain_count+'</div></div>'+
    '<div class="stat-card"><div class="label">Wallets</div><div class="value">'+(activeWallet=="ALL"?wallets.length:1)+'</div></div>';

  if(currentPage=="dashboard"){
    if(pieChart)pieChart.destroy();
    var ctx=document.getElementById("pieChart").getContext("2d");
    var labels=[],data=[],bg=[],cc={"ethereum":"#627eea","optimism":"#ff0420","base":"#0052ff","arbitrum":"#28a0f0","polygon":"#8247e5","gnosis":"#04795b","zksync":"#1573fe","celo":"#35d07f","scroll":"#ebc28e"};
    for(var c in d.chains){if(d.chains.hasOwnProperty(c)&&d.chains[c]>0.01){labels.push(c.charAt(0).toUpperCase()+c.slice(1));data.push(Math.round(toCurr(d.chains[c])*100)/100);bg.push(cc[c]||"#30363d")}}
    if(data.length>0)pieChart=new Chart(ctx,{type:"doughnut",data:{labels:labels,datasets:[{data:data,backgroundColor:bg,borderColor:"#0a0e14",borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"right",labels:{color:"#b0b8c4",padding:12,font:{size:11},generateLabels:function(chart){var d=chart.data;return d.labels.map(function(l,i){var v=d.datasets[0].data[i];var total=d.datasets[0].data.reduce(function(a,b){return a+b},0);var pct=Math.round(v/total*100);return{text:l+"  "+pct+"%",fillStyle:d.datasets[0].backgroundColor[i],strokeStyle:d.datasets[0].backgroundColor[i],index:i}})}}}}}});
    drawMiniChart();
    var chainsHtml="";for(var c in d.chains){if(d.chains.hasOwnProperty(c)&&d.chains[c]>0)chainsHtml+='<span class="chain-tag">'+c+': '+fmtCurr(d.chains[c])+'</span>'}
    document.getElementById("walletChains").innerHTML=chainsHtml||'<span style="color:#6e7681">Aucune</span>';
    var errHtml="";if(d.errors&&d.errors.length)errHtml=d.errors.map(function(e){return'<div class="error">⚠ '+(e.wallet?e.wallet+": ":"")+e.chain+': '+e.error+'</div>'}).join("");
    document.getElementById("walletError").innerHTML=errHtml;
  }

  if(currentPage=="tokens") renderTokenTable(d);
}

function renderTokenTable(d){
  var sym=currSymbol(),showWallet=activeWallet=="ALL"&&wallets.length>1;
  var html='<div class="card"><h2>📋 Détail tokens <span style="font-weight:400;font-size:.7rem;color:#6e7681">('+d.token_count+' tokens)</span></h2><table><thead><tr><th>Token</th>'+(showWallet?'<th>Wallet</th>':'')+'<th>Chaîne</th><th>Balance</th><th>Prix</th><th>'+sym+' Valeur</th></tr></thead><tbody>';
  for(var i=0;i<d.tokens.length;i++){var t=d.tokens[i];var icon=t.icon?'<img class="ti" src="'+t.icon+'" onerror="this.style.display=\'none\'">':'';var pf=sym+(t.usd_price<0.01?t.usd_price.toFixed(6):t.usd_price.toFixed(4));html+='<tr><td>'+icon+'<b>'+t.name+'</b> <span style="color:#6e7681;font-size:.75rem">'+t.symbol+'</span></td>'+(showWallet?'<td style="font-size:.75rem;color:#6e7681">'+t._wallet+'</td>':'')+'<td class="chain">'+t.chain+'</td><td>'+t.balance.toLocaleString()+'</td><td>'+pf+'</td><td class="usd">'+fmtCurr(t.usd_value)+'</td></tr>'}
  html+='</tbody></table></div>';
  document.getElementById("pageTokens").innerHTML=html;
}

async function drawLineChart(){
  try{var token=document.getElementById("chartToken").value;var r=await fetch("/api/snapshots"+(token?"?token="+token:""));var snaps=await r.json();if(snaps.length<2){if(lineChart)lineChart.destroy();return}
    if(chartRange!="all"){var cutoff=Date.now()-parseInt(chartRange)*86400*1000;snaps=snaps.filter(function(s){return new Date(s.date+"Z").getTime()>cutoff});if(snaps.length<2){if(lineChart)lineChart.destroy();return}}
    if(lineChart)lineChart.destroy();var ctx=document.getElementById("lineChart").getContext("2d");var sym=currSymbol();
    lineChart=new Chart(ctx,{type:"line",data:{labels:snaps.map(function(s){return s.date.slice(5,16).replace("T"," ")}),datasets:[{label:"Valeur ("+sym+")",data:snaps.map(function(s){return Math.round(toCurr(s.total_usd)*100)/100}),borderColor:"#4dabf7",backgroundColor:"rgba(77,171,247,0.1)",fill:true,tension:0.3,pointRadius:1,pointHoverRadius:4,borderWidth:1.5}]},options:{responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:"index"},plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#6e7681",font:{size:9},maxTicksLimit:8},grid:{color:"#1e2530"}},y:{ticks:{color:"#6e7681",font:{size:9},callback:function(v){return sym+v.toLocaleString()}},grid:{color:"#1e2530"}}}}})}catch(e){}
}

async function drawMiniChart(){
  try{
    var r=await fetch("/api/snapshots");var snaps=await r.json();
    if(snaps.length<2){if(miniChart)miniChart.destroy();return}
    var days={"day":1,"week":7,"month":30};
    var cutoff=Date.now()-days[quickRange]*86400*1000;
    snaps=snaps.filter(function(s){return new Date(s.date+"Z").getTime()>cutoff});
    if(snaps.length<2){if(miniChart)miniChart.destroy();return}
    if(miniChart)miniChart.destroy();
    var ctx=document.getElementById("miniChart").getContext("2d");var sym=currSymbol();
    miniChart=new Chart(ctx,{type:"line",data:{labels:snaps.map(function(s){return s.date.slice(5,16).replace("T"," ")}),datasets:[{data:snaps.map(function(s){return Math.round(toCurr(s.total_usd)*100)/100}),borderColor:"#4dabf7",backgroundColor:"rgba(77,171,247,0.1)",fill:true,tension:0.3,pointRadius:0,borderWidth:1.5}]},options:{responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:"index"},plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#6e7681",font:{size:9},maxTicksLimit:5},grid:{color:"#1e2530"}},y:{ticks:{color:"#6e7681",font:{size:9},callback:function(v){return sym+v.toLocaleString()}},grid:{color:"#1e2530"}}}}});
  }catch(e){}
}
